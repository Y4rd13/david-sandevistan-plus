# David Sandevistan Plus — Immunoblocker Item & Vendor Integration
# ALL item customization in YAML — CET does NOT modify items (SetFlat corrupts TweakXL records)
# Forward references to CET status effects are on OAE records, NOT on items

# ============================================================
# Custom icons
# ============================================================

UIIcon.Immunoblocker_Common:
  $type: gamedataUIIcon_Record
  atlasResourcePath: davidsandevistanplus\immunoblocker_common.inkatlas
  atlasPartName: Immunoblocker_Common

UIIcon.Immunoblocker_Uncommon:
  $type: gamedataUIIcon_Record
  atlasResourcePath: davidsandevistanplus\immunoblocker_uncommon.inkatlas
  atlasPartName: Immunoblocker_Uncommon

UIIcon.Immunoblocker_Rare:
  $type: gamedataUIIcon_Record
  atlasResourcePath: davidsandevistanplus\immunoblocker_rare.inkatlas
  atlasPartName: Immunoblocker_Rare

# ============================================================
# Price stat modifiers
# ============================================================

Items.MartinezImmunoblockerCommon_Price:
  $type: gamedataConstantStatModifier_Record
  modifierType: Additive
  statType: BaseStats.Price
  value: 2000.0

Items.MartinezImmunoblockerUncommon_Price:
  $type: gamedataConstantStatModifier_Record
  modifierType: Additive
  statType: BaseStats.Price
  value: 6000.0

Items.MartinezImmunoblockerRare_Price:
  $type: gamedataConstantStatModifier_Record
  modifierType: Additive
  statType: BaseStats.Price
  value: 20000.0

# ============================================================
# ObjectActionEffect records (forward ref to CET status effects — on OAE, not item)
# ============================================================

ObjectActionEffect.MartinezImmunoblocker_Common:
  $type: gamedataObjectActionEffect_Record
  statusEffect: BaseStatusEffect.MartinezSandevistan_Immunoblocker_Common
  percentMissing: False
  resistanceFlag: None
  range: 0.0

ObjectActionEffect.MartinezImmunoblocker_Uncommon:
  $type: gamedataObjectActionEffect_Record
  statusEffect: BaseStatusEffect.MartinezSandevistan_Immunoblocker_Uncommon
  percentMissing: False
  resistanceFlag: None
  range: 0.0

ObjectActionEffect.MartinezImmunoblocker_Rare:
  $type: gamedataObjectActionEffect_Record
  statusEffect: BaseStatusEffect.MartinezSandevistan_Immunoblocker_Rare
  percentMissing: False
  resistanceFlag: None
  range: 0.0

# ============================================================
# ItemAction records (consume actions)
# ============================================================

ItemAction.MartinezImmunoblockerUse_Common:
  $base: ItemAction.Consume
  completionEffects:
    - ObjectActionEffect.MartinezImmunoblocker_Common

ItemAction.MartinezImmunoblockerUse_Uncommon:
  $base: ItemAction.Consume
  completionEffects:
    - ObjectActionEffect.MartinezImmunoblocker_Uncommon

ItemAction.MartinezImmunoblockerUse_Rare:
  $base: ItemAction.Consume
  completionEffects:
    - ObjectActionEffect.MartinezImmunoblocker_Rare

# ============================================================
# Item definitions
# ============================================================

Items.MartinezImmunoblockerCommon:
  $base: Items.HealthBooster
  quality: Quality.Common
  displayName: l"DavidSandevistanPlus-Immunoblocker"
  localizedDescription: l"DavidSandevistanPlus-Immunoblocker-Desc"
  icon: UIIcon.Immunoblocker_Common
  iconPath: Immunoblocker_Common
  objectActions:
    - ItemAction.MartinezImmunoblockerUse_Common
    - ItemAction.Drop
    - ItemAction.ConsumableDisassemble
  tags:
    - Preload
    - HasModel
    - Consumable
    - Drug
    - Medical
    - LongLasting
    - Inhaler
  statModifiers:
    - Items.LongLasting_inline0
  statModifierGroups:
    - Items.LongLastingConsumableDuration
  OnEquip: []
  buyPrice:
    - Items.MartinezImmunoblockerCommon_Price
  sellPrice:
    - Items.MartinezImmunoblockerCommon_Price
    - Price.SellMultiplier

Items.MartinezImmunoblockerUncommon:
  $base: Items.HealthBooster
  quality: Quality.Uncommon
  displayName: l"DavidSandevistanPlus-Immunoblocker-High"
  localizedDescription: l"DavidSandevistanPlus-Immunoblocker-High-Desc"
  icon: UIIcon.Immunoblocker_Uncommon
  iconPath: Immunoblocker_Uncommon
  objectActions:
    - ItemAction.MartinezImmunoblockerUse_Uncommon
    - ItemAction.Drop
    - ItemAction.ConsumableDisassemble
  tags:
    - Preload
    - HasModel
    - Consumable
    - Drug
    - Medical
    - LongLasting
    - Inhaler
  statModifiers:
    - Items.LongLasting_inline0
  statModifierGroups:
    - Items.LongLastingConsumableDuration
  OnEquip: []
  buyPrice:
    - Items.MartinezImmunoblockerUncommon_Price
  sellPrice:
    - Items.MartinezImmunoblockerUncommon_Price
    - Price.SellMultiplier

Items.MartinezImmunoblockerRare:
  $base: Items.HealthBooster
  quality: Quality.Rare
  displayName: l"DavidSandevistanPlus-Immunoblocker-Mil"
  localizedDescription: l"DavidSandevistanPlus-Immunoblocker-Mil-Desc"
  icon: UIIcon.Immunoblocker_Rare
  iconPath: Immunoblocker_Rare
  objectActions:
    - ItemAction.MartinezImmunoblockerUse_Rare
    - ItemAction.Drop
    - ItemAction.ConsumableDisassemble
  tags:
    - Preload
    - HasModel
    - Consumable
    - Drug
    - Medical
    - LongLasting
    - Inhaler
  statModifiers:
    - Items.LongLasting_inline0
  statModifierGroups:
    - Items.LongLastingConsumableDuration
  OnEquip: []
  buyPrice:
    - Items.MartinezImmunoblockerRare_Price
  sellPrice:
    - Items.MartinezImmunoblockerRare_Price
    - Price.SellMultiplier

